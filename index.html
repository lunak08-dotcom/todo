<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0eb;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
      color: #3d3530;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-style: italic;
      font-weight: 700;
      color: #5c4a3a;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #a0897a;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* 입력 카드 */
    .input-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .input-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0d5cc;
      border-radius: 10px;
      font-size: 0.95rem;
      background: #fdf9f6;
      color: #3d3530;
      outline: none;
      transition: border 0.2s;
    }

    .input-row input[type="text"]:focus {
      border-color: #c4a882;
    }

    .btn-add {
      padding: 10px 20px;
      background: #c4a882;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #b08f6a; }

    .options-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .options-row select,
    .options-row input[type="date"] {
      padding: 7px 12px;
      border: 1.5px solid #e0d5cc;
      border-radius: 8px;
      background: #fdf9f6;
      font-size: 0.85rem;
      color: #3d3530;
      outline: none;
      cursor: pointer;
    }

    .priority-picker {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .priority-picker span {
      font-size: 0.8rem;
      color: #a0897a;
    }

    .priority-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }

    .priority-btn:hover { transform: scale(1.2); }
    .priority-btn.selected { border-color: #3d3530; transform: scale(1.15); }

    .p-high   { background: #e57373; }
    .p-mid    { background: #f5c842; }
    .p-low    { background: #72b572; }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1.5px solid #d9cfc6;
      background: #fff;
      font-size: 0.85rem;
      color: #7a6a5e;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .tab-btn:hover { background: #f0e8e0; }

    .tab-btn.active {
      background: #c4a882;
      color: #fff;
      border-color: #c4a882;
      font-weight: 700;
    }

    /* 진행률 */
    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a0897a;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 6px;
      background: #e8ddd5;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #c4a882;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    /* 할 일 목록 */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
      animation: fadeIn 0.25s ease;
    }

    .todo-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.09);
    }

    .todo-item.done {
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .priority-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      accent-color: #c4a882;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-body {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 0.95rem;
      word-break: break-word;
      transition: all 0.2s;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #b0a09a;
    }

    .todo-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f0e8de;
      color: #8a7060;
      font-weight: 600;
    }

    .due-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .due-ok     { background: #eaf4ea; color: #4a8a4a; }
    .due-soon   { background: #fff5d6; color: #9a7a10; }
    .due-today  { background: #fff0d0; color: #c07000; }
    .due-over   { background: #fde8e8; color: #c04040; }

    .btn-del {
      background: none;
      border: none;
      color: #d0b8a8;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
      padding: 2px 4px;
    }

    .btn-del:hover { color: #e57373; }

    .empty-msg {
      text-align: center;
      color: #c4b0a4;
      font-size: 0.9rem;
      padding: 40px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>My Todo</h1>
    <p id="today-str"></p>
  </header>

  <!-- 입력 카드 -->
  <div class="input-card">
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." />
      <button class="btn-add" onclick="addTodo()">추가</button>
    </div>
    <div class="options-row">
      <select id="cat-select">
        <option value="수업">수업</option>
        <option value="조합">조합</option>
        <option value="가족">가족</option>
        <option value="기타">기타</option>
      </select>
      <input type="date" id="due-input" />
      <div class="priority-picker">
        <span>중요도</span>
        <button class="priority-btn p-high selected" data-p="high" onclick="selectPriority(this)" title="높음"></button>
        <button class="priority-btn p-mid"  data-p="mid"  onclick="selectPriority(this)" title="보통"></button>
        <button class="priority-btn p-low"  data-p="low"  onclick="selectPriority(this)" title="낮음"></button>
      </div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" data-cat="전체" onclick="selectTab(this)">전체</button>
    <button class="tab-btn" data-cat="수업"  onclick="selectTab(this)">수업</button>
    <button class="tab-btn" data-cat="조합"  onclick="selectTab(this)">조합</button>
    <button class="tab-btn" data-cat="가족"  onclick="selectTab(this)">가족</button>
    <button class="tab-btn" data-cat="기타"  onclick="selectTab(this)">기타</button>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progress-text">0 / 0 완료</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- 목록 -->
  <div class="todo-list" id="todo-list"></div>
</div>

<script>
  let todos = JSON.parse(localStorage.getItem('my-todos') || '[]');
  let currentTab = '전체';
  let selectedPriority = 'high';

  const PRIORITY_COLOR = { high: '#e57373', mid: '#f5c842', low: '#72b572' };

  // 오늘 날짜 표시
  const now = new Date();
  document.getElementById('today-str').textContent =
    now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  function save() {
    localStorage.setItem('my-todos', JSON.stringify(todos));
  }

  function selectPriority(btn) {
    document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedPriority = btn.dataset.p;
  }

  function selectTab(btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.cat;
    render();
  }

  function getDueBadge(dueStr) {
    if (!dueStr) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const due   = new Date(dueStr); due.setHours(0,0,0,0);
    const diff  = Math.round((due - today) / 86400000);

    if (diff < 0)  return `<span class="due-badge due-over">기한 초과</span>`;
    if (diff === 0) return `<span class="due-badge due-today">오늘 마감</span>`;
    if (diff <= 3)  return `<span class="due-badge due-soon">D-${diff}</span>`;
    return `<span class="due-badge due-ok">D-${diff}</span>`;
  }

  function addTodo() {
    const text = document.getElementById('todo-input').value.trim();
    if (!text) return;

    todos.push({
      id: Date.now(),
      text,
      cat: document.getElementById('cat-select').value,
      due: document.getElementById('due-input').value,
      priority: selectedPriority,
      done: false
    });

    document.getElementById('todo-input').value = '';
    document.getElementById('due-input').value = '';
    save();
    render();
  }

  function toggleDone(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    const list = document.getElementById('todo-list');
    let filtered = currentTab === '전체' ? [...todos] : todos.filter(t => t.cat === currentTab);

    // 완료 항목 맨 아래
    filtered.sort((a, b) => {
      if (a.done === b.done) return 0;
      return a.done ? 1 : -1;
    });

    // 진행률 업데이트
    const total = filtered.length;
    const done  = filtered.filter(t => t.done).length;
    const pct   = total === 0 ? 0 : Math.round(done / total * 100);
    document.getElementById('progress-text').textContent = `${done} / ${total} 완료`;
    document.getElementById('progress-pct').textContent  = `${pct}%`;
    document.getElementById('progress-fill').style.width = `${pct}%`;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-msg">할 일이 없어요 :)</div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="todo-item ${t.done ? 'done' : ''}">
        <span class="priority-dot" style="background:${PRIORITY_COLOR[t.priority]}"></span>
        <input type="checkbox" class="todo-check" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})" />
        <div class="todo-body">
          <div class="todo-text">${escHtml(t.text)}</div>
          <div class="todo-meta">
            <span class="cat-badge">${t.cat}</span>
            ${getDueBadge(t.due)}
          </div>
        </div>
        <button class="btn-del" onclick="deleteTodo(${t.id})" title="삭제">✕</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 엔터키로 추가
  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  render();
</script>
</body>
</html>
